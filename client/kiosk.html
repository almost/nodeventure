<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Nodeventure!</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel='stylesheet' href='//fonts.googleapis.com/css?family=Press+Start+2P'>
</head>
<body class="kiosk">
  <header>
    <h1>Nodeventure</h1>
  </header>
  <audio src="../assets/enter.wav" autoplay></audio>
  <div class="game">
    <div id="output"> </div>
    <div id="display"></div>
  </div>
  <div id="input">
    <label for="command">Enter command:</label>
    <input id="command"/>
    <button id="send">Send</button>
  </div>
  <div id="name-modal" class="modal-hidden">
    <form id="name-form">
      <label for="name-input">Name?</label>
      <input id="name-input" autocomplete="off" />
      <button type="submit">OK</button>
    </form>
  </div>
  <div id="kiosk-welcome">
    <h1>Nodeventure</h1>
    <p class="welcome-message">Please come in</p>
    <p class="blink">Hit any key to start</p>
  </div>
  <script src="js/jquery.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/display.js"></script>
  <script src="js/script.js"></script>
  <script src="js/ios-orientation-fix.js"></script>
  <script src="js/kiosk.js"></script>
</body>
</html>
