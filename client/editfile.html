<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Nodeventure - Code</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/editor.css">

    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.19.0/src-min-noconflict/ace.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/ace-builds@1.19.0/css/ace.min.css" rel="stylesheet">
  </head>
  <body>
    <nav id="topnav">
      <span class="brand">Nodeventure</span>
      <a class="tab" href="/rooms/">Rooms</a>
      <a class="tab" href="/items/">Items</a>
      <a class="tab active" href="/edit/">Code</a>
      <span class="spacer"></span>
      <span class="ext">
        <a href="/" target="_blank">Play</a>
        <a href="https://github.com/asyncjs/nodeventure/wiki" target="_blank">Docs</a>
        <a href="https://github.com/asyncjs/nodeventure/" target="_blank">GitHub</a>
      </span>
    </nav>
    <div class="container">
      <div id="files" class="sidebar">
        <button id="new">+ New File</button>
        <ul>
          <li>Loading...</li>
        </ul>
        <form id="uploadfile">
          Upload file: <input type="file">
        </form>
      </div>
      <div class="right ace-host" id="editor">
        <div id="toolbar">
          <span id="filename"></span>
          <select id="version"></select>
          <button id="save">Save</button>
          <button id="revert">Revert</button>
          <button id="delete">Delete</button>
        </div>
        <div id="ace"></div>
        <div id="errors"></div>
        <div id="logs"></div>
      </div>
    </div>

    <script src="/js/fileeditor.js"></script>
  </body>
</html>
